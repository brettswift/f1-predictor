# Weekly job: refresh driver data from Ergast API.
# Runs every Sunday at 02:00 UTC to update driver roster before each season/week.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: f1-driver-refresh
  namespace: f1-predictor
spec:
  schedule: "0 2 * * 0"   # Every Sunday at 02:00 UTC
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 3600
      template:
        spec:
          restartPolicy: OnFailure
          containers:
          - name: driver-refresh
            image: ghcr.io/brettswift/f1-predictor:latest
            command:
            - python3
            - /app/cron/refresh_drivers.py
            env:
            - name: DATABASE_PATH
              value: "/data/f1_predictions.db"
            - name: F1_API_URL
              value: "https://api.jolpi.ca/ergast/f1"
            - name: F1_SEASON
              value: "2026"
            resources:
              requests:
                cpu: "100m"
                memory: "128Mi"
              limits:
                cpu: "500m"
                memory: "256Mi"
            volumeMounts:
            - name: data
              mountPath: /data
          volumes:
          - name: data
            persistentVolumeClaim:
              claimName: f1-predictor-data
